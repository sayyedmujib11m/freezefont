<!DOCTYPE html>
<html>

<head>

    <title>FreezeFont</title>

    <link
        rel="stylesheet"
        href="styles.css"
    >

</head>

<body>

<div class="card">

    <h1>FreezeFont</h1>

    <div class="tagline">
        Variable Font → Static TTF
    </div>

    <div class="subtitle">
        Upload a variable font and inspect it before conversion.
    </div>

    <input
        type="file"
        id="fontFile"
        hidden
    >

    <div
        class="dropzone"
        id="dropzone"
    >

        <div class="icon">
            Aa
        </div>

        <h3>
            Drop Font Here
        </h3>

        <div>
            or click to browse
        </div>

        <div
            class="filename"
            id="fileName"
        >
            No file selected
        </div>

        <div class="formats">
            Supported: TTF • OTF • WOFF2 Variable Fonts
        </div>

    </div>

    <div
        class="infoBox"
        id="infoBox"
    >

        <div class="infoTitle">
            Font Information
        </div>

        <div id="fontInfo"></div>

        <div class="modeBox">

            <b>Conversion Mode</b>

            <div class="modeItem">
                <label>
                    <input
                        type="radio"
                        name="mode"
                        value="basic"
                        checked
                    >
                    Basic Styles (Recommended)
                </label>
            </div>

            <div class="modeItem">
                <label>
                    <input
                        type="radio"
                        name="mode"
                        value="all"
                    >
                    All Styles
                </label>
            </div>

        </div>

    </div>

    <button
        id="convertBtn"
    >
        Convert & Download
    </button>

    <div
        class="spinner"
        id="spinner"
    ></div>

    <div
        class="status"
        id="status"
    ></div>

</div>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
