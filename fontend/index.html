</head>

<body>

<div class="card">

```
<h1>FreezeFont</h1>

<div class="tagline">
    Variable Font → Static TTF
</div>

<p>
    Upload a variable font and download all static instances as a ZIP file.
</p>

<input
    type="file"
    id="fontFile"
>

<div
    class="filename"
    id="fileName"
>
    No file selected
</div>

<button id="convertBtn">
    Convert Font
</button>

<div class="status" id="status"></div>
```

</div>

<script>

const fontInput =
document.getElementById("fontFile");

const fileName =
document.getElementById("fileName");

const convertBtn =
document.getElementById("convertBtn");

const statusText =
document.getElementById("status");

fontInput.addEventListener(
    "change",
    function(){

        if(this.files.length > 0){

            fileName.textContent =
            this.files[0].name;

        }

    }
);

convertBtn.addEventListener(
    "click",
    async function(){

        if(fontInput.files.length === 0){

            alert("Please select a font");

            return;
        }

        convertBtn.disabled = true;

        statusText.textContent =
        "Converting...";

        const formData = new FormData();

        formData.append(
            "file",
            fontInput.files[0]
        );

        try{

            const response =
            await fetch(
                "http://127.0.0.1:8000/upload",
                {
                    method:"POST",
                    body:formData
                }
            );

            const blob =
            await response.blob();

            const url =
            window.URL.createObjectURL(blob);

            const a =
            document.createElement("a");

            a.href = url;

            a.download =
            "FreezeFont.zip";

            document.body.appendChild(a);

            a.click();

            a.remove();

            statusText.textContent =
            "Download complete";

        }
        catch(error){

            statusText.textContent =
            "Conversion failed";

            console.error(error);

        }

        convertBtn.disabled = false;

    }
);

</script>

</body>
</html>
