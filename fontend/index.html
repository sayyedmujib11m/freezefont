<!DOCTYPE html>
<html>

<head>
<title>FreezeFont</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:700px;
    background:white;
    padding:40px;
    border-radius:24px;
    box-shadow:0 10px 40px rgba(0,0,0,.08);
    text-align:center;
}

h1{
    margin:0;
    font-size:52px;
}

.tagline{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

.subtitle{
    color:#666;
    margin-top:15px;
    line-height:1.6;
}

.dropzone{
    margin-top:30px;
    border:3px dashed #ddd;
    border-radius:20px;
    padding:50px 20px;
    cursor:pointer;
}

.dropzone.dragover{
    border-color:black;
    background:#fafafa;
}

.icon{
    font-size:48px;
}

.filename{
    margin-top:15px;
    font-weight:bold;
}

.formats{
    margin-top:15px;
    color:#888;
    font-size:14px;
}

.infoBox{
    margin-top:25px;
    padding:20px;
    border-radius:12px;
    background:#fafafa;
    text-align:left;
    display:none;
}

.infoTitle{
    font-weight:bold;
    margin-bottom:10px;
}

.axis{
    margin-top:5px;
}

.styles{
    margin-top:15px;
    padding-top:15px;
    border-top:1px solid #ddd;
}

.styleItem{
    margin-top:4px;
    color:#444;
}

.modeBox{
    margin-top:20px;
    padding-top:20px;
    border-top:1px solid #ddd;
}

.modeItem{
    margin-top:10px;
}

button{
    margin-top:25px;
    border:none;
    background:black;
    color:white;
    padding:15px 30px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
}

button:disabled{
    opacity:.5;
}

.status{
    margin-top:20px;
    font-weight:bold;
}

.spinner{
    display:none;
    width:30px;
    height:30px;
    border:4px solid #ddd;
    border-top:4px solid black;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:20px auto 0;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

</style>
</head>

<body>

<div class="card">

<h1>FreezeFont</h1>

<div class="tagline">
Variable Font → Static TTF
</div>

<div class="subtitle">
Upload a variable font and inspect it before conversion.
</div>

<input
type="file"
id="fontFile"
hidden
>

<div
class="dropzone"
id="dropzone"
>

<div class="icon">
Aa
</div>

<h3>
Drop Font Here
</h3>

<div>
or click to browse
</div>

<div
class="filename"
id="fileName"
>
No file selected
</div>

<div class="formats">
Supported: TTF • OTF • WOFF2 Variable Fonts
</div>

</div>

<div
class="infoBox"
id="infoBox"
>

<div class="infoTitle">
Font Information
</div>

<div id="fontInfo"></div>

<div class="modeBox">

<b>Conversion Mode</b>

<div class="modeItem">
<label>
<input
type="radio"
name="mode"
value="basic"
checked
>
Basic Styles (Recommended)
</label>
</div>

<div class="modeItem">
<label>
<input
type="radio"
name="mode"
value="all"
>
All Styles
</label>
</div>

</div>

</div>

<button
id="convertBtn"
>
Convert & Download
</button>

<div
class="spinner"
id="spinner"
></div>

<div
class="status"
id="status"
></div>

</div>

<script>

const dropzone =
document.getElementById("dropzone");

const fileInput =
document.getElementById("fontFile");

const fileName =
document.getElementById("fileName");

const convertBtn =
document.getElementById("convertBtn");

const statusText =
document.getElementById("status");

const spinner =
document.getElementById("spinner");

const infoBox =
document.getElementById("infoBox");

const fontInfo =
document.getElementById("fontInfo");

dropzone.addEventListener(
    "click",
    () => fileInput.click()
);

async function inspectSelectedFont(){

    if(fileInput.files.length === 0){
        return;
    }

    const formData =
    new FormData();

    formData.append(
        "file",
        fileInput.files[0]
    );

    const response =
    await fetch(
        "http://127.0.0.1:8000/inspect",
        {
            method:"POST",
            body:formData
        }
    );

    const data =
    await response.json();

    let html = "";

    html += "<b>Font:</b> " + data.family_name + "<br><br>";

    html += "<b>Instances:</b> " + data.instance_count + "<br><br>";

    html += "<b>Axes:</b><br>";

    data.axes.forEach(axis => {

        html +=
        "<div class='axis'>" +
        axis.tag +
        " : " +
        axis.min +
        " → " +
        axis.max +
        "</div>";

    });

    html += "<div class='styles'>";
    html += "<b>Sample Styles</b><br>";

    data.instances.slice(0,10).forEach(style => {

        html +=
        "<div class='styleItem'>" +
        style +
        "</div>";

    });

    if(data.instances.length > 10){

        html +=
        "<div class='styleItem'>...</div>";

    }

    html += "</div>";

    fontInfo.innerHTML = html;

    infoBox.style.display = "block";
}

fileInput.addEventListener(
    "change",
    () => {

        if(fileInput.files.length){

            fileName.textContent =
            fileInput.files[0].name;

            inspectSelectedFont();

        }

    }
);

dropzone.addEventListener(
    "dragover",
    e => {

        e.preventDefault();
        dropzone.classList.add("dragover");

    }
);

dropzone.addEventListener(
    "dragleave",
    () => {

        dropzone.classList.remove("dragover");

    }
);

dropzone.addEventListener(
    "drop",
    e => {

        e.preventDefault();

        dropzone.classList.remove(
            "dragover"
        );

        fileInput.files =
        e.dataTransfer.files;

        if(fileInput.files.length){

            fileName.textContent =
            fileInput.files[0].name;

            inspectSelectedFont();

        }

    }
);

convertBtn.addEventListener(
    "click",
    async () => {

        if(fileInput.files.length === 0){

            alert(
                "Please select a font."
            );

            return;
        }

        spinner.style.display =
        "block";

        convertBtn.disabled = true;

        statusText.textContent =
        "Converting font...";

        const mode =
        document.querySelector(
            'input[name="mode"]:checked'
        ).value;

        const formData =
        new FormData();

        formData.append(
            "file",
            fileInput.files[0]
        );

        formData.append(
            "mode",
            mode
        );

        try{

            const response =
            await fetch(
                "http://127.0.0.1:8000/upload",
                {
                    method:"POST",
                    body:formData
                }
            );

            const blob =
            await response.blob();

            const url =
            window.URL.createObjectURL(
                blob
            );

            const a =
            document.createElement("a");

            a.href = url;
            a.download = "FreezeFont.zip";

            document.body.appendChild(a);
            a.click();
            a.remove();

            spinner.style.display =
            "none";

            statusText.textContent =
            "✅ Conversion Complete";

        }
        catch(error){

            spinner.style.display =
            "none";

            statusText.textContent =
            "❌ Conversion Failed";

            console.error(error);

        }

        convertBtn.disabled =
        false;

    }
);

</script>

</body>
</html>
